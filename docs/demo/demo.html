<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 900px; height: 560px; overflow: hidden; font-family: -apple-system, "Segoe UI", system-ui, sans-serif; }
  #screen {
    position: absolute; inset: 0;
    background:
      radial-gradient(120% 90% at 20% 0%, #3a4a6b 0%, #1c2340 45%, #0e1124 100%);
  }
  #menubar {
    position: absolute; top: 0; left: 0; right: 0; height: 26px;
    background: rgba(10, 12, 22, 0.45);
    backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 14px; color: #e7e9ee; font-size: 12px; font-weight: 500;
  }
  #menubar .right { display: flex; gap: 14px; align-items: center; opacity: 0.85; }
  #wp-title {
    position: absolute; left: 0; right: 0; top: 46%;
    text-align: center; color: rgba(255,255,255,0.10);
    font-size: 88px; font-weight: 800; letter-spacing: 4px;
    transform: translateY(-50%); user-select: none;
  }

  #card {
    position: absolute; top: 50px; right: 24px;
    width: 360px; height: 280px;
    border-radius: 20px; overflow: hidden;
    background: #0e1116;
    border: 1px solid rgba(255,255,255,0.10);
    box-shadow: 0 24px 60px rgba(0,0,0,0.55);
    transform: translateX(440px);
    opacity: 0;
  }

  #feed { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }

  #top, #bottom {
    position: absolute; left: 0; right: 0; z-index: 3;
    padding: 14px 16px; color: #fff;
    display: flex; align-items: center;
  }
  #top { top: 0; justify-content: space-between;
    background: linear-gradient(to bottom, rgba(0,0,0,0.55), rgba(0,0,0,0)); }
  #bottom { bottom: 0; flex-direction: column; align-items: flex-start; gap: 4px;
    background: linear-gradient(to top, rgba(0,0,0,0.65), rgba(0,0,0,0)); }
  #cam { font-size: 15px; font-weight: 600; }
  #close { width: 24px; height: 24px; border-radius: 50%;
    background: rgba(0,0,0,0.4); color: #fff; font-size: 13px;
    display: flex; align-items: center; justify-content: center; }
  #line { display: flex; align-items: center; gap: 10px; }
  #badge { font-size: 17px; font-weight: 700; }
  #score { font-size: 12px; font-weight: 700; color: #07140c;
    background: #3ddc84; padding: 3px 9px; border-radius: 999px; }
  #info { font-size: 13px; opacity: 0.92; }
</style>
</head>
<body>
  <div id="screen">
    <div id="wp-title">PEEK</div>
    <div id="menubar">
      <span>🔔 Peek</span>
      <span class="right"><span>100%</span><span id="clock">21:47</span></span>
    </div>

    <div id="card">
      <canvas id="feed" width="360" height="280"></canvas>
      <div id="top">
        <span id="cam">🔔 Front Door</span>
        <span id="close">✕</span>
      </div>
      <div id="bottom">
        <div id="line">
          <span id="badge">🧍 Person</span>
          <span id="score">94%</span>
        </div>
        <div id="info">👤 Alex&nbsp;&nbsp;&nbsp;📍 Front porch</div>
      </div>
    </div>
  </div>

  <script src="demo.js"></script>
</body>
</html>
