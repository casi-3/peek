name: Bug report
description: Something is not working as expected
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the problem and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux (from source)
    validations:
      required: true
  - type: input
    id: frigate
    attributes:
      label: Frigate version
      placeholder: "0.17.1"
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Output from the terminal when run with `npm start`, if available.
      render: shell
